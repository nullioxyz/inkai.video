name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_TARGET_DIR: /var/www/html/inkai/frontend
  REMOTE_SERVICE_NAME: inkai-frontend.service
  NODE_VERSION: '22'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: inkai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy target
        run: |
          set -euo pipefail
          test "$DEPLOY_TARGET_DIR" = "/var/www/html/inkai/frontend"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build-time environment
        env:
          NEXT_PUBLIC_IAVIDEO_API_URL: ${{ vars.NEXT_PUBLIC_IAVIDEO_API_URL != '' && vars.NEXT_PUBLIC_IAVIDEO_API_URL || secrets.NEXT_PUBLIC_IAVIDEO_API_URL }}
          NEXT_PUBLIC_FRONTEND_URL: ${{ vars.NEXT_PUBLIC_FRONTEND_URL != '' && vars.NEXT_PUBLIC_FRONTEND_URL || secrets.NEXT_PUBLIC_FRONTEND_URL }}
          IAVIDEO_API_URL: ${{ vars.IAVIDEO_API_URL != '' && vars.IAVIDEO_API_URL || secrets.IAVIDEO_API_URL }}
          NEXT_PUBLIC_LANGUAGE_ID_EN: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_EN != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_EN || secrets.NEXT_PUBLIC_LANGUAGE_ID_EN }}
          NEXT_PUBLIC_LANGUAGE_ID_PT_BR: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR || secrets.NEXT_PUBLIC_LANGUAGE_ID_PT_BR }}
          NEXT_PUBLIC_LANGUAGE_ID_IT: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_IT != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_IT || secrets.NEXT_PUBLIC_LANGUAGE_ID_IT }}
        run: |
          set -euo pipefail

          [ -n "${NEXT_PUBLIC_IAVIDEO_API_URL:-}" ] || { echo "Missing NEXT_PUBLIC_IAVIDEO_API_URL"; exit 1; }
          [ -n "${NEXT_PUBLIC_FRONTEND_URL:-}" ] || { echo "Missing NEXT_PUBLIC_FRONTEND_URL"; exit 1; }
          [ -n "${IAVIDEO_API_URL:-}" ] || { echo "Missing IAVIDEO_API_URL"; exit 1; }
          [ -n "${NEXT_PUBLIC_LANGUAGE_ID_EN:-}" ] || { echo "Missing NEXT_PUBLIC_LANGUAGE_ID_EN"; exit 1; }
          [ -n "${NEXT_PUBLIC_LANGUAGE_ID_PT_BR:-}" ] || { echo "Missing NEXT_PUBLIC_LANGUAGE_ID_PT_BR"; exit 1; }
          [ -n "${NEXT_PUBLIC_LANGUAGE_ID_IT:-}" ] || { echo "Missing NEXT_PUBLIC_LANGUAGE_ID_IT"; exit 1; }

          [ "$NEXT_PUBLIC_IAVIDEO_API_URL" = "https://api.inkai.video" ] || {
            echo "NEXT_PUBLIC_IAVIDEO_API_URL must be https://api.inkai.video";
            exit 1;
          }

          [ "$IAVIDEO_API_URL" = "https://api.inkai.video" ] || {
            echo "IAVIDEO_API_URL must be https://api.inkai.video";
            exit 1;
          }

          [ "$NEXT_PUBLIC_FRONTEND_URL" = "https://inkai.video" ] || {
            echo "NEXT_PUBLIC_FRONTEND_URL must be https://inkai.video";
            exit 1;
          }

      - name: Run tests
        env:
          NEXT_PUBLIC_IAVIDEO_API_URL: ${{ vars.NEXT_PUBLIC_IAVIDEO_API_URL != '' && vars.NEXT_PUBLIC_IAVIDEO_API_URL || secrets.NEXT_PUBLIC_IAVIDEO_API_URL }}
          NEXT_PUBLIC_FRONTEND_URL: ${{ vars.NEXT_PUBLIC_FRONTEND_URL != '' && vars.NEXT_PUBLIC_FRONTEND_URL || secrets.NEXT_PUBLIC_FRONTEND_URL }}
          NEXT_PUBLIC_LANGUAGE_ID_EN: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_EN != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_EN || secrets.NEXT_PUBLIC_LANGUAGE_ID_EN }}
          NEXT_PUBLIC_LANGUAGE_ID_PT_BR: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR || secrets.NEXT_PUBLIC_LANGUAGE_ID_PT_BR }}
          NEXT_PUBLIC_LANGUAGE_ID_IT: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_IT != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_IT || secrets.NEXT_PUBLIC_LANGUAGE_ID_IT }}
          NEXT_PUBLIC_IAVIDEO_WS_ENABLED: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_ENABLED != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_ENABLED || secrets.NEXT_PUBLIC_IAVIDEO_WS_ENABLED }}
          NEXT_PUBLIC_IAVIDEO_WS_HOST: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_HOST != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_HOST || secrets.NEXT_PUBLIC_IAVIDEO_WS_HOST }}
          NEXT_PUBLIC_IAVIDEO_WS_PORT: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_PORT != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_PORT || secrets.NEXT_PUBLIC_IAVIDEO_WS_PORT }}
          NEXT_PUBLIC_IAVIDEO_WS_SCHEME: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_SCHEME != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_SCHEME || secrets.NEXT_PUBLIC_IAVIDEO_WS_SCHEME }}
          NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT || secrets.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT }}
          NEXT_PUBLIC_IAVIDEO_WS_DEBUG: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_DEBUG != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_DEBUG || secrets.NEXT_PUBLIC_IAVIDEO_WS_DEBUG }}
          IAVIDEO_API_URL: ${{ vars.IAVIDEO_API_URL != '' && vars.IAVIDEO_API_URL || secrets.IAVIDEO_API_URL }}
        run: npm test

      - name: Build application
        env:
          NEXT_PUBLIC_IAVIDEO_API_URL: ${{ vars.NEXT_PUBLIC_IAVIDEO_API_URL != '' && vars.NEXT_PUBLIC_IAVIDEO_API_URL || secrets.NEXT_PUBLIC_IAVIDEO_API_URL }}
          NEXT_PUBLIC_FRONTEND_URL: ${{ vars.NEXT_PUBLIC_FRONTEND_URL != '' && vars.NEXT_PUBLIC_FRONTEND_URL || secrets.NEXT_PUBLIC_FRONTEND_URL }}
          NEXT_PUBLIC_LANGUAGE_ID_EN: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_EN != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_EN || secrets.NEXT_PUBLIC_LANGUAGE_ID_EN }}
          NEXT_PUBLIC_LANGUAGE_ID_PT_BR: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_PT_BR || secrets.NEXT_PUBLIC_LANGUAGE_ID_PT_BR }}
          NEXT_PUBLIC_LANGUAGE_ID_IT: ${{ vars.NEXT_PUBLIC_LANGUAGE_ID_IT != '' && vars.NEXT_PUBLIC_LANGUAGE_ID_IT || secrets.NEXT_PUBLIC_LANGUAGE_ID_IT }}
          NEXT_PUBLIC_IAVIDEO_WS_ENABLED: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_ENABLED != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_ENABLED || secrets.NEXT_PUBLIC_IAVIDEO_WS_ENABLED }}
          NEXT_PUBLIC_IAVIDEO_WS_HOST: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_HOST != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_HOST || secrets.NEXT_PUBLIC_IAVIDEO_WS_HOST }}
          NEXT_PUBLIC_IAVIDEO_WS_PORT: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_PORT != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_PORT || secrets.NEXT_PUBLIC_IAVIDEO_WS_PORT }}
          NEXT_PUBLIC_IAVIDEO_WS_SCHEME: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_SCHEME != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_SCHEME || secrets.NEXT_PUBLIC_IAVIDEO_WS_SCHEME }}
          NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT || secrets.NEXT_PUBLIC_IAVIDEO_WS_AUTH_ENDPOINT }}
          NEXT_PUBLIC_IAVIDEO_WS_DEBUG: ${{ vars.NEXT_PUBLIC_IAVIDEO_WS_DEBUG != '' && vars.NEXT_PUBLIC_IAVIDEO_WS_DEBUG || secrets.NEXT_PUBLIC_IAVIDEO_WS_DEBUG }}
          IAVIDEO_API_URL: ${{ vars.IAVIDEO_API_URL != '' && vars.IAVIDEO_API_URL || secrets.IAVIDEO_API_URL }}
        run: npm run build

      - name: Prepare standalone artifact
        run: |
          set -euo pipefail

          test -d .next/standalone
          test -d .next/static

          rm -rf deploy-artifact
          mkdir -p deploy-artifact/.next

          cp -R .next/standalone/. deploy-artifact/
          cp -R .next/static deploy-artifact/.next/static

          if [ -d public ]; then
            cp -R public deploy-artifact/public
          fi

          tar -C deploy-artifact -czf frontend-standalone.tar.gz .

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create remote incoming directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "set -euo pipefail; \
             test '$DEPLOY_TARGET_DIR' = '/var/www/html/inkai/frontend'; \
             test -d '$DEPLOY_TARGET_DIR'; \
             mkdir -p '$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID'"

      - name: Upload artifact and deploy script
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail

          scp -i ~/.ssh/id_ed25519 -P "$SSH_PORT" \
            frontend-standalone.tar.gz \
            "$SSH_USER@$SSH_HOST:$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID/frontend-standalone.tar.gz"

          scp -i ~/.ssh/id_ed25519 -P "$SSH_PORT" \
            scripts/deploy-frontend-remote.sh \
            "$SSH_USER@$SSH_HOST:$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID/deploy-frontend-remote.sh"

      - name: Execute remote deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            chmod 700 '$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID/deploy-frontend-remote.sh'
            DEPLOY_TARGET_DIR='$DEPLOY_TARGET_DIR' \
            RELEASE_ID='$RELEASE_ID' \
            ARTIFACT_PATH='$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID/frontend-standalone.tar.gz' \
            SERVICE_NAME='$REMOTE_SERVICE_NAME' \
            '$DEPLOY_TARGET_DIR/.incoming/$RELEASE_ID/deploy-frontend-remote.sh'
          "
